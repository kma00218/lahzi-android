name: Build Release AAB & APK

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java 17 ────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Android SDK ────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. ImageMagick for icon resizing ──────────────────────────────────
      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      # ── 5. Generate all icon PNGs from source app-icon.png ────────────────
      - name: Generate launcher icons and splash
        run: bash scripts/setup-icons.sh

      # ── 6. Gradle wrapper ─────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Set up Gradle wrapper
        run: |
          gradle wrapper --gradle-version=8.7 --distribution-type=bin
        working-directory: .

      # ── 7. Decode keystore ────────────────────────────────────────────────
      - name: Decode keystore
        run: |
          mkdir -p keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore/lahzi-release.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      # ── 8. Build release AAB ──────────────────────────────────────────────
      - name: Build release AAB
        run: ./gradlew bundleRelease --no-daemon
        env:
          KEYSTORE_PATH:      keystore/lahzi-release.jks
          KEYSTORE_PASSWORD:  ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}

      # ── 9. Build release APK ──────────────────────────────────────────────
      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PATH:      keystore/lahzi-release.jks
          KEYSTORE_PASSWORD:  ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}

      # ── 10. Upload artifacts ──────────────────────────────────────────────
      - name: Upload AAB (Google Play)
        uses: actions/upload-artifact@v4
        with:
          name: lahzi-release-${{ github.run_number }}.aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Upload APK (testing)
        uses: actions/upload-artifact@v4
        with:
          name: lahzi-release-${{ github.run_number }}.apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      # ── 11. Print key info ────────────────────────────────────────────────
      - name: Print SHA-256 fingerprint (needed for assetlinks.json)
        run: |
          keytool -list -v \
            -keystore keystore/lahzi-release.jks \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            2>/dev/null | grep "SHA256:" || true
