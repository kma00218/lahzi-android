plugins {
    id 'com.android.application'
}

android {
    namespace 'com.lahzi.app'
    compileSdk 35

    defaultConfig {
        applicationId "com.lahzi.app"
        minSdk 21
        targetSdk 35
        versionCode 2
        versionName "1.0.2"
    }

    signingConfigs {
        release {
            storeFile     rootProject.file(System.getenv("KEYSTORE_PATH") ?: "keystore/lahzi-release.p12")
            storePassword System.getenv("KEYSTORE_PASSWORD") ?: ""
            keyAlias      System.getenv("KEY_ALIAS")         ?: "lahzi"
            keyPassword   System.getenv("KEY_PASSWORD")      ?: ""
            storeType     "PKCS12"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            applicationIdSuffix ".debug"
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    bundle {
        language { enableSplit = false }
        density  { enableSplit = true  }
        abi      { enableSplit = true  }
    }
}

dependencies {
    // AppCompat — required for Theme.AppCompat (used in styles.xml)
    implementation 'androidx.appcompat:appcompat:1.6.1'
    // Custom Tabs — explicit pin to avoid transitive version conflicts
    implementation 'androidx.browser:browser:1.8.0'
    // TWA / Android Browser Helper
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
}
